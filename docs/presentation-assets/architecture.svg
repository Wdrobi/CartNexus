<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 280" role="img" aria-labelledby="title desc">
  <title id="title">CartNexus system architecture</title>
  <desc id="desc">Browser clients connect to Node API and PostgreSQL database</desc>
  <defs>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d9488"/>
      <stop offset="100%" style="stop-color:#0f766e"/>
    </linearGradient>
    <filter id="sh" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.12"/>
    </filter>
    <marker id="arrowHead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0,10 3,0 6" fill="#0d9488"/>
    </marker>
  </defs>
  <rect width="720" height="280" fill="#f8fafc"/>
  <g filter="url(#sh)">
    <rect x="40" y="60" width="160" height="160" rx="12" fill="#fff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="120" y="100" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#0f172a">Browser</text>
    <text x="120" y="125" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">React + Vite</text>
    <rect x="60" y="140" width="120" height="28" rx="6" fill="#ecfdf5" stroke="#99f6e4"/>
    <text x="120" y="158" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#0f766e">Shop (public)</text>
    <rect x="60" y="174" width="120" height="28" rx="6" fill="#f0fdfa" stroke="#5eead4"/>
    <text x="120" y="192" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#115e59">Admin panel</text>
  </g>
  <path d="M210 140 L265 140" stroke="url(#g1)" stroke-width="3" fill="none" marker-end="url(#arrowHead)"/>
  <g filter="url(#sh)">
    <rect x="270" y="50" width="180" height="180" rx="12" fill="#fff" stroke="#cbd5e1" stroke-width="2"/>
    <text x="360" y="88" text-anchor="middle" font-family="system-ui,sans-serif" font-size="14" font-weight="700" fill="#0f172a">REST API</text>
    <text x="360" y="108" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">Node.js · Express</text>
    <rect x="290" y="122" width="140" height="90" rx="8" fill="#f8fafc" stroke="#e2e8f0"/>
    <text x="360" y="155" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#334155">Auth · Products</text>
    <text x="360" y="175" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#334155">Orders · CMS · Admin</text>
    <text x="360" y="195" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="#334155">JSON / JWT</text>
  </g>
  <path d="M455 140 L510 140" stroke="url(#g1)" stroke-width="3" fill="none" marker-end="url(#arrowHead)"/>
  <g filter="url(#sh)">
    <rect x="515" y="70" width="165" height="140" rx="12" fill="#fff" stroke="#cbd5e1" stroke-width="2"/>
    <ellipse cx="597" cy="95" rx="55" ry="18" fill="#e0f2fe" stroke="#38bdf8"/>
    <ellipse cx="597" cy="175" rx="55" ry="18" fill="#e0f2fe" stroke="#38bdf8"/>
    <path d="M542 95 L542 175" stroke="#38bdf8" stroke-width="2"/>
    <path d="M652 95 L652 175" stroke="#38bdf8" stroke-width="2"/>
    <text x="597" y="145" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#0369a1">PostgreSQL</text>
    <text x="597" y="215" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">Products · Orders · Users</text>
  </g>
</svg>
