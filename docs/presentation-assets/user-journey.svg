<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" role="img" aria-labelledby="uj">
  <title id="uj">Customer journey vs admin workflow</title>
  <rect width="800" height="200" fill="#f8fafc"/>
  <text x="400" y="36" text-anchor="middle" font-family="system-ui,sans-serif" font-size="16" font-weight="700" fill="#0f172a">Dual surface: storefront &amp; operations</text>
  <!-- Customer path -->
  <rect x="40" y="70" width="140" height="56" rx="10" fill="#ecfdf5" stroke="#14b8a6" stroke-width="2"/>
  <text x="110" y="105" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#115e59">Browse</text>
  <path d="M185 98 L215 98" stroke="#64748b" stroke-width="2" marker-end="url(#m)"/>
  <rect x="220" y="70" width="140" height="56" rx="10" fill="#ecfdf5" stroke="#14b8a6" stroke-width="2"/>
  <text x="290" y="105" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#115e59">Cart &amp; checkout</text>
  <path d="M365 98 L395 98" stroke="#64748b" stroke-width="2" marker-end="url(#m)"/>
  <rect x="400" y="70" width="160" height="56" rx="10" fill="#ccfbf1" stroke="#0d9488" stroke-width="2"/>
  <text x="480" y="105" text-anchor="middle" font-family="system-ui,sans-serif" font-size="13" fill="#134e4a">Order placed</text>
  <defs>
    <marker id="m" markerWidth="8" markerHeight="8" refX="8" refY="4" orient="auto"><polygon points="0 0,8 4,0 8" fill="#64748b"/></marker>
  </defs>
  <!-- Admin -->
  <text x="110" y="158" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#64748b">Customer</text>
  <rect x="40" y="165" width="520" height="24" rx="6" fill="#e2e8f0"/>
  <text x="300" y="182" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" fill="#475569">Admin: catalog · inventory · orders · CMS · settings</text>
</svg>
